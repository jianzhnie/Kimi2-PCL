name: tests

on:
  pull_request:
    paths:
      - "models/**"
      - "utils/**"
      - "tests/**"
      - "pytest.ini"
      - "scripts/check_*"
      - ".github/workflows/tests.yml"
  push:
    branches: [main]
    paths:
      - "models/**"
      - "utils/**"
      - "tests/**"
      - "pytest.ini"
      - "scripts/check_*"
      - ".github/workflows/tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov pytest-xdist pytest-benchmark matplotlib safetensors
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch

      - name: Run unit tests with coverage
        run: |
          pytest -q -n auto -m "not benchmark" \
            --junitxml=pytest-junit.xml \
            --cov=models --cov=utils \
            --cov-report=term-missing --cov-report=html \
            --cov-fail-under=90

      - name: Enforce average unit test runtime <= 1s
        run: |
          python scripts/check_pytest_timing_threshold.py pytest-junit.xml --max-average-seconds 1.0

      - name: Run benchmark tests and export trend artifacts
        run: |
          mkdir -p .benchmarks
          pytest -q -m benchmark --benchmark-only \
            --benchmark-json=.benchmarks/benchmark.json \
            --benchmark-histogram=.benchmarks/histogram

      - name: Enforce benchmark mean <= 1s
        run: |
          python scripts/check_benchmark_threshold.py .benchmarks/benchmark.json --max-mean-seconds 1.0

      - name: Upload coverage and benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            htmlcov/
            .benchmarks/
            pytest-junit.xml
